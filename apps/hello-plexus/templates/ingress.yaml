apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-plexus
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: hello-plexus.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-plexus
                port:
                  number: {{ .Values.service.port }}
